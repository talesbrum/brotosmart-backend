# railway.toml — configuração de deploy do BrotoSmart no Railway
# Coloque este arquivo na raiz da pasta backend/

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
dockerContext = "."
target = "production"

[deploy]
startCommand = "docker-entrypoint.sh node src/server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
